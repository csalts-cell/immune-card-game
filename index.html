<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Immune Card Creator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Immune Cell Card Designer</h1>

<div id="editor">

<div id="controls">

<label>Card Name</label>
<input id="nameInput" placeholder="Macrophage">

<label>Hit Points</label>
<input id="hpInput" type="number" placeholder="10">

<label>Defense</label>
<input id="defInput" type="number" placeholder="5">

<label>Card Color</label>
<input type="color" id="colorPicker">

<label>Background Image</label>
<input type="text" id="bgInput" placeholder="Paste image URL">

<button onclick="updateCard()">Apply Design</button>

</div>

<div id="card">

<div id="cardName">Cell Name</div>

<div id="cardStats">
HP: <span id="hp">0</span>  
DEF: <span id="def">0</span>
</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
