<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Immune Card Creator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>Immune Cell Card Designer</h1>

<div id="editor">

<div id="controls">

<label>Immune Cell Name</label>
<input id="nameInput" placeholder="Macrophage">

<label>Cell Surface Marker</label>
<input id="markerInput" placeholder="CD4">

<label>Attack</label>
<input id="attackInput" type="number" placeholder="5">

<label>Defense</label>
<input id="defenseInput" type="number" placeholder="3">

<label>Hit Points</label>
<input id="hpInput" type="number" placeholder="10">

<label>Special Ability</label>
<input id="abilityInput" placeholder="Engulf Pathogens">

<label>Card Color</label>
<input type="color" id="colorPicker">

<label>Background Image URL</label>
<input id="bgInput" placeholder="Paste image link">

<button onclick="updateCard()">Apply Design</button>

</div>

<div id="card">

<div id="cardName">Cell Name</div>

<div id="cardMarker">Marker: --</div>

<div id="cardAbility">Ability: --</div>

<div id="cardStats">
ATK: <span id="attack">0</span><br>
DEF: <span id="defense">0</span><br>
HP: <span id="hp">0</span>
</div>

</div>

</div>

<script src="game.js"></script>

</body>
</html>
