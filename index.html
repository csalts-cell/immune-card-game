<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Immune Cell Card Designer</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

#editor{
display:flex;
justify-content:center;
gap:60px;
margin-top:30px;
}

/* 2 column inputs */

#controls{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
width:340px;
}

#controls label{
grid-column:span 2;
font-weight:bold;
}

input, select{
padding:6px;
width:100%;
}

button{
grid-column:span 2;
padding:10px;
cursor:pointer;
margin-top:5px;
}

/* CARD */

#card{

width:260px;
height:420px;

border-radius:16px;

padding:20px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:space-between;

background-size:cover;
background-position:center;

color:black;

position:relative;
overflow:hidden;

}

/* rarity frames */

#frame{
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
border-radius:16px;
pointer-events:none;
border:6px solid gray;
}

.common #frame{
border-color:#9ca3af;
}

.rare #frame{
border-color:#3b82f6;
box-shadow:0 0 15px #3b82f6;
}

.legendary #frame{
border-color:#f59e0b;
box-shadow:0 0 25px #f59e0b;
}

/* foreground art */

#foreground{

position:absolute;

width:160px;
height:140px;

top:120px;
left:50px;

background-size:contain;
background-repeat:no-repeat;
background-position:center;

cursor:move;

}

/* resize handle */

#resizeHandle{

position:absolute;

width:14px;
height:14px;

background:white;
border:2px solid black;

bottom:150px;
right:30px;

cursor:nwse-resize;

}

/* text */

#cardName{
font-size:22px;
font-weight:bold;
}

#cardMarker{
background:rgba(255,255,255,0.7);
padding:6px;
border-radius:6px;
}

#cardAbility{
background:rgba(255,255,255,0.7);
padding:6px;
border-radius:6px;
font-style:italic;
}

#cardStats{
background:rgba(255,255,255,0.7);
padding:8px;
border-radius:8px;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</head>

<body>

<h1>Immune Cell Card Designer</h1>

<div id="editor">

<div id="controls">

<label>Immune Cell Name</label>
<input id="nameInput">

<label>Cell Surface Marker</label>
<input id="markerInput">

<label>Attack</label>
<input id="attackInput" type="number">

<label>Defense</label>
<input id="defenseInput" type="number">

<label>Hit Points</label>
<input id="hpInput" type="number">

<label>Special Ability</label>
<input id="abilityInput">

<label>Rarity</label>
<select id="raritySelect">
<option value="common">Common</option>
<option value="rare">Rare</option>
<option value="legendary">Legendary</option>
</select>

<label>Card Color</label>
<input type="color" id="colorPicker">

<label>Background Image</label>
<input type="file" id="bgUpload">

<label>Foreground Image</label>
<input type="file" id="fgUpload">

<button onclick="updateCard()">Apply Design</button>

<button onclick="downloadCard()">Download Card</button>

</div>

<div id="card" class="common">

<div id="frame"></div>

<div id="cardName">Cell Name</div>

<div id="foreground"></div>

<div id="resizeHandle"></div>

<div id="cardMarker">Marker: --</div>

<div id="cardAbility">Ability: --</div>

<div id="cardStats">
ATK: <span id="attack">0</span><br>
DEF: <span id="defense">0</span><br>
HP: <span id="hp">0</span>
</div>

</div>

</div>

<script>

/* UPDATE CARD TEXT */

function updateCard(){

let name=document.getElementById("nameInput").value
let marker=document.getElementById("markerInput").value
let attack=document.getElementById("attackInput").value
let defense=document.getElementById("defenseInput").value
let hp=document.getElementById("hpInput").value
let ability=document.getElementById("abilityInput").value
let rarity=document.getElementById("raritySelect").value
let color=document.getElementById("colorPicker").value

let card=document.getElementById("card")

card.className=rarity
card.style.backgroundColor=color

if(name)document.getElementById("cardName").innerText=name
if(marker)document.getElementById("cardMarker").innerText="Marker: "+marker
if(ability)document.getElementById("cardAbility").innerText="Ability: "+ability

document.getElementById("attack").innerText=attack
document.getElementById("defense").innerText=defense
document.getElementById("hp").innerText=hp

}

/* IMAGE UPLOADS */

document.getElementById("bgUpload").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(event){

document.getElementById("card").style.backgroundImage=
"url("+event.target.result+")"

}

reader.readAsDataURL(e.target.files[0])

})

document.getElementById("fgUpload").addEventListener("change",function(e){

let reader=new FileReader()

reader.onload=function(event){

document.getElementById("foreground").style.backgroundImage=
"url("+event.target.result+")"

}

reader.readAsDataURL(e.target.files[0])

})

/* DRAG FOREGROUND */

let fg=document.getElementById("foreground")

let dragging=false
let offsetX,offsetY

fg.addEventListener("mousedown",function(e){

dragging=true
offsetX=e.offsetX
offsetY=e.offsetY

})

document.addEventListener("mousemove",function(e){

if(!dragging)return

let card=document.getElementById("card")
let rect=card.getBoundingClientRect()

fg.style.left=(e.clientX-rect.left-offsetX)+"px"
fg.style.top=(e.clientY-rect.top-offsetY)+"px"

})

document.addEventListener("mouseup",()=>dragging=false)

/* RESIZE */

let handle=document.getElementById("resizeHandle")
let resizing=false

handle.addEventListener("mousedown",()=>resizing=true)

document.addEventListener("mouseup",()=>resizing=false)

document.addEventListener("mousemove",function(e){

if(!resizing)return

let card=document.getElementById("card")
let rect=card.getBoundingClientRect()

fg.style.width=(e.clientX-rect.left-fg.offsetLeft)+"px"
fg.style.height=(e.clientY-rect.top-fg.offsetTop)+"px"

})

/* DOWNLOAD */

function downloadCard(){

html2canvas(document.getElementById("card")).then(canvas=>{

let link=document.createElement("a")

link.href=canvas.toDataURL("image/png")

link.download="immune_card.png"

document.body.appendChild(link)

link.click()

document.body.removeChild(link)

})

}

</script>

</body>
</html>
